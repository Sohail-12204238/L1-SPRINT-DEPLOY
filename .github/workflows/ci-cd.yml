name: FounderLink CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker tags must be lowercase. This converts the repo name safely.
      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ─── BUILD & TEST BACKEND SERVICES ───────────────────────────────
      - name: Build and Test Service Registry
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./service-registry

      - name: Build and Test API Gateway
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./api-gateway

      - name: Build and Test Auth Service
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./authservice

      - name: Build and Test User Service
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./user-service

      - name: Build and Test Startup Service
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./startup-service

      - name: Build and Test Investment Service
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./investment-service

      - name: Build and Test Team Service
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./team-service

      - name: Build and Test Notification Service
        run: mvn -B clean verify -Dtest="*ServiceTest,*ControllerTest" -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: ./founderlink-notification-service

      # ─── BUILD & TEST FRONTEND ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./founderlink-frontend

      - name: Run Frontend Tests
        run: npm test
        working-directory: ./founderlink-frontend

      # ─── BUILD & PUSH DOCKER IMAGES ───────────────────────────────────
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          SERVICES=(
            "service-registry"
            "api-gateway"
            "authservice"
            "user-service"
            "startup-service"
            "investment-service"
            "team-service"
            "founderlink-notification-service"
            "founderlink-frontend"
          )
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "🚀 Building and pushing $SERVICE..."
            
            IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$SERVICE:latest
            
            # Build the Docker image using the directory as context
            docker build -t $IMAGE_TAG ./$SERVICE
            
            # Push the Docker image to GHCR
            docker push $IMAGE_TAG
          done
