services:

  # ================= RABBITMQ =================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  # ================= ZIPKIN =================
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: always
    ports:
      - "9411:9411"

  # ================= AUTH =================
  auth-service:
    build: ./authservice
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=host.docker.internal
      - EUREKA_HOST=host.docker.internal
      - ZIPKIN_HOST=zipkin

  # ================= USER =================
  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=host.docker.internal
      - EUREKA_HOST=host.docker.internal
      - ZIPKIN_HOST=zipkin

  # ================= STARTUP =================
  startup-service:
    build: ./startup-service
    container_name: startup-service
    restart: always
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=host.docker.internal
      - EUREKA_HOST=host.docker.internal
      - ZIPKIN_HOST=zipkin

  # ================= INVESTMENT =================
  investment-service:
    build: ./investment-service
    container_name: investment-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      - rabbitmq
    env_file:
      - .env
    environment:
      - MYSQL_HOST=host.docker.internal
      - EUREKA_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_HOST=zipkin

  # ================= TEAM =================
  team-service:
    build: ./team-service
    container_name: team-service
    restart: always
    ports:
      - "8087:8087"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=host.docker.internal
      - EUREKA_HOST=host.docker.internal
      - ZIPKIN_HOST=zipkin

  # ================= NOTIFICATION =================
  notification-service:
    build: ./founderlink-notification-service
    container_name: notification-service
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      - rabbitmq
    env_file:
      - .env
    environment:
      - MYSQL_HOST=host.docker.internal
      - EUREKA_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_HOST=zipkin

  # ================= SONARQUBE =================
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

  # ================= API GATEWAY =================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      - auth-service
      - user-service
      - startup-service
      - investment-service
      - team-service
      - notification-service
    env_file:
      - .env
    environment:
      - EUREKA_HOST=host.docker.internal
      - ZIPKIN_HOST=zipkin

  # ================= FRONTEND =================
  frontend:
    build: ./founderlink-frontend
    container_name: founderlink-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway

