services:

  # ================= MYSQL =================
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ================= RABBITMQ =================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  # ================= ZIPKIN =================
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: always
    ports:
      - "9411:9411"

  # ================= EUREKA =================
  discovery-server:
    build: ./service-registry
    container_name: discovery-server
    restart: always
    ports:
      - "8761:8761"

  # ================= AUTH =================
  auth-service:
    build: ./authservice
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - discovery-server
    env_file:
      - .env

  # ================= USER =================
  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - discovery-server
    env_file:
      - .env

  # ================= STARTUP =================
  startup-service:
    build: ./startup-service
    container_name: startup-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - discovery-server
    env_file:
      - .env

  # ================= INVESTMENT =================
  investment-service:
    build: ./investment-service
    container_name: investment-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - rabbitmq
      - discovery-server
    env_file:
      - .env

  # ================= TEAM =================
  team-service:
    build: ./team-service
    container_name: team-service
    restart: always
    ports:
      - "8087:8087"
    depends_on:
      - mysql
      - discovery-server
    env_file:
      - .env

  # ================= NOTIFICATION =================
  notification-service:
    build: ./founderlink-notification-service
    container_name: notification-service
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      - mysql
      - rabbitmq
      - discovery-server
    env_file:
      - .env

  # ================= SONARQUBE =================
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

  # ================= API GATEWAY =================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      - discovery-server
      - auth-service
      - user-service
      - startup-service
      - investment-service
      - team-service
      - notification-service
    env_file:
      - .env

volumes:
  mysql_data: