services:

  # ================= MYSQL =================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-1234}
      - MYSQL_DATABASE=auth_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ================= RABBITMQ =================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  # ================= ZIPKIN =================
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: always
    ports:
      - "9411:9411"

  # ================= SERVICE REGISTRY =================
  service-registry:
    build: ./service-registry
    container_name: service-registry
    restart: always
    ports:
      - "8761:8761"

  # ================= AUTH =================
  auth-service:
    build: ./authservice
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - service-registry
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_HOST=service-registry
      - ZIPKIN_HOST=zipkin

  # ================= USER =================
  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - service-registry
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_HOST=service-registry
      - ZIPKIN_HOST=zipkin

  # ================= STARTUP =================
  startup-service:
    build: ./startup-service
    container_name: startup-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - service-registry
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_HOST=service-registry
      - ZIPKIN_HOST=zipkin

  # ================= INVESTMENT =================
  investment-service:
    build: ./investment-service
    container_name: investment-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - service-registry
      - rabbitmq
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_HOST=service-registry
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_HOST=zipkin

  # ================= TEAM =================
  team-service:
    build: ./team-service
    container_name: team-service
    restart: always
    ports:
      - "8087:8087"
    depends_on:
      - mysql
      - service-registry
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_HOST=service-registry
      - ZIPKIN_HOST=zipkin

  # ================= NOTIFICATION =================
  notification-service:
    build: ./founderlink-notification-service
    container_name: notification-service
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      - mysql
      - service-registry
      - rabbitmq
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - EUREKA_HOST=service-registry
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_HOST=zipkin

  # ================= API GATEWAY =================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      - service-registry
      - auth-service
      - notification-service
    env_file:
      - .env
    environment:
      - EUREKA_HOST=service-registry
      - ZIPKIN_HOST=zipkin

  # ================= FRONTEND =================
  frontend:
    build: ./founderlink-frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data: